<app-back-button />

<div class="container py-4">
    @if (petDetails) {
        <div class="row g-4 mb-5">
            
            <div class="col-lg-6">
                <div class="card shadow-sm h-100">
                    <div class="card-header d-flex align-items-center">
                        <h3>Pet</h3>
                        <button type="button" class="btn btn-sm btn-primary ms-auto" [disabled]="!form.dirty" (click)="saveEditChanges()">Save</button>
                    </div>
                    <div class="card-body">
                        <form [formGroup]="form">
                            <div class="row">
                                <div class="col-2">
                                    <b>Name:</b>
                                </div>
                                <div class="col">
                                    <input class="form-control" formControlName="name">
                                </div>
                            </div>
        
                            <div class="row">
                                <div class="col-2">
                                    <b>Species:</b>
                                </div>
                                <div class="col">
                                    <input class="form-control" formControlName="species">
                                </div>
                            </div>
                                
                            <div class="row">
                                <div class="col-2">
                                    <b>Breed:</b>
                                </div>
                                <div class="col">
                                    <input class="form-control" formControlName="breed">
                                </div>
                            </div>
                                
                            <div class="row">
                                <div class="col-2">
                                    <b>Weight:</b>
                                </div>
                                <div class="col">
                                    <input class="form-control" formControlName="weight">
                                </div>
                            </div>
                                
                            <div class="row">
                                <div class="col-2">
                                    <b>Birth:</b>
                                </div>
                                <div class="col">
                                    <input class="form-control" type="date" formControlName="birthDate">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            @if (petDetails.owner) {
                <div class="col-lg-6">
                    <div class="card clickable-card shadow-sm h-100" (click)="viewOwnerDetails(petDetails.owner.ownerId)">
                        <div class="card-header">
                            <h3>Owner</h3>
                        </div>
                    
                        <div class="card-body">
                            <b>Name:</b>
                            <p>{{ petDetails.owner.firstName }} {{ petDetails.owner.lastName }}</p>
                            
                            <b>Phone:</b>
                            <p>{{ petDetails.owner.phoneNumber }}</p>
                            
                            <b>Email:</b>
                            <p>{{ petDetails.owner.email }}</p>
                            
                            <b>Address:</b>
                            <p>{{ petDetails.owner.address }}</p>
                        </div>
                    </div>
                </div>
            }
        </div>
    }
</div>
